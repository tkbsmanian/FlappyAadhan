headersOrigin = "config"
redirects = []

[dev]
command = "python3 -m http.server 8765"
port = 8765.0
targetPort = 8765.0

[functions]

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-lighthouse"

[plugins.inputs]
output_path = "reports/lighthouse.html"

[[plugins.inputs.audits]]
path = "/"

[plugins.inputs.audits.thresholds]
performance = 0.9
accessibility = 0.8
best-practices = 0.9

[build]
publish = "/Volumes/Yazhan/My Documents/Repo/Py/Project/Dev/Flappy_Kiro"
publishOrigin = "config"
commandOrigin = "config"
command = "node scripts/perf-check.mjs"

[build.environment]
NODE_VERSION = "20"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.execute-api.*.amazonaws.com https://*.up.railway.app; frame-ancestors 'none'"

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "no-cache, no-store, must-revalidate"
Pragma = "no-cache"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"